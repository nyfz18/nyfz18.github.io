<!-- projects.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nina Zhang - Projects</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f9f9f9;
      margin: 0;
      padding: 0;
      line-height: 1.6;
      color: #333;
    }

    header {
      background-color: #222;
      color: #fff;
      padding: 2rem 1rem;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }

    section {
      padding: 2rem;
    }

    footer {
      text-align: center;
      padding: 1rem;
      color: #888;
      font-size: 0.9rem;
    }

    a {
      color: #0066cc;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .project-entry {
        display: flex;
        align-items: flex-start;
        gap: 1.5rem;
        margin-bottom: 2rem;
    }

    .project-image {
        width: 250px;
        height: auto;
        border-radius: 8px;
        object-fit: cover;
    }

    .project-text {
        flex: 1;
    }

    .project-text h3 {
        margin-top: 0;
    }

    .project-text a {
        color: #007BFF;
        text-decoration: none;
    }

    .project-text a:hover {
        text-decoration: underline;
    }
  </style>
</head>
<body>

  <header>
    <h1>Projects</h1>
    <p><a href="index.html" style="color:#fff;">← Back to Home</a></p>
  </header>

  <div class="container">
    <section>
      <h2>Featured Work</h2>
      <p>Some of my current projects:</p>
      
        <div class="project-entry">
            <img src="redline.jpg" alt="Screenshot of Project Redline" class="project-image">
            <div class="project-text">
              <h3>Project Redline</h3>
              <p>A decision-based game simulating moral dilemmas and ethics in a dystopian bureaucracy.</p>
              <a href="https://github.com/nyfz18/project-redline" target="_blank">View Project</a>
            </div>
        </div>
    </section>
  </div>

  <footer>
    &copy; 2025 Nina Zhang. All rights reserved.
  </footer>

</body>
</html>
