<!-- projects.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nina Zhang - Coursework</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f9f9f9;
      margin: 0;
      padding: 0;
      line-height: 1.6;
      color: #333;
    }

    header {
      background-color: #222;
      color: #fff;
      padding: 2rem 1rem;
      text-align: center;
    }

    .container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }

    section {
      padding: 2rem;
    }

    footer {
      text-align: center;
      padding: 1rem;
      color: #888;
      font-size: 0.9rem;
    }

    a {
      color: #0066cc;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .project-entry {
        display: flex;
        align-items: flex-start;
        gap: 1.5rem;
        margin-bottom: 2rem;
    }

    .project-image {
        width: 250px;
        height: auto;
        border-radius: 8px;
        object-fit: cover;
    }

    .project-text {
        flex: 1;
    }

    .project-text h3 {
        margin-top: 0;
    }

    .project-text a {
        color: #007BFF;
        text-decoration: none;
    }

    .project-text a:hover {
        text-decoration: underline;
    }

    .course-text p {
        margin: 4px 0;
        line-height: 1.3;
    }

    .course-text h3 {
        color: #4B0082;
    }
  </style>
</head>
<body>

  <header>
    <h1>Coursework</h1>
    <p><a href="index.html" style="color:#fff;">← Back to Home</a></p>
  </header>

  <div class="container">
    <section>
      <h2>Relevant Coursework</h2>
      
        <div class="course-entry">
            <div class="course-text">
                <h3> (Non Credit) Machine Learning Specialization - Coursera/Stanford/DeepLearning.AI</h3>
                <p>Taught by Andrew Ng</p>
                <p>Covers fundamental AI concepts and develop pratical machine learning skills</p>
            </div>
        </div>
    </section>
  </div>

  <footer>
    &copy; 2025 Nina Zhang. All rights reserved.
  </footer>

</body>
</html>
